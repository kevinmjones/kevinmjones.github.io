<path class="arrow" d="M286 176 C330 176 330 176 372 176"/>
<rect class="box" x="374" y="58" width="260" height="118" rx="18"/><text class="l" x="404" y="96">SECURE BRIDGE</text><text class="t" x="404" y="130">IPC + context isolation</text><text class="s" x="404" y="154">Typed browser-to-main APIs</text>
