<style>.box{fill:#111827;stroke:#2d3655;stroke-width:2;filter:url(#shadow)}.accent{stroke:url(#g);stroke-width:3}.t{font:600 22px Inter,Arial;fill:#f8fafc}.s{font:500 14px Inter,Arial;fill:#a7b0c5}.l{font:700 12px Inter,Arial;fill:#6ee7d8;letter-spacing:.12em}.arrow{stroke:#7786aa;stroke-width:3;fill:none;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7786aa"/></marker></defs>
