<rect class="box accent" x="734" y="216" width="330" height="118" rx="18"/><text class="l" x="764" y="254">RISK INTELLIGENCE</text><text class="t" x="764" y="288">Policy-to-risk analysis</text><text class="s" x="764" y="312">Profiles, processes, issues, reports</text>
